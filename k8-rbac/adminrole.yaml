apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: roboshop
  name: roboshop-admin
rules:
- apiGroups: ["*"] # "" indicates the core API group
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: roboshop-admin
rules:
- apiGroups: ["storage.k8s.io/v1"] # "" indicates the core API group
  resources: ["StorageClass"]
  verbs: ["get", "watch", "list"]
- apiGroups: [""] 
  resources: ["persistentvolumes"]
  verbs: ["get", "watch", "list"]

