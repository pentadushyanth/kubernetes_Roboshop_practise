apiVersion: v1
kind: Pod
metadata:
  name: pod-2
spec:   
  affinity:
    podAffinityTerm:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values:
            - pod-1
            - pod-2
        topologyKey: topology.kubernetes.io/zone
  containers:
  - name: nginx
    image: nginx
    imagePullPolicy: Always
