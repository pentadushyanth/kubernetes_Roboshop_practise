apiVersion: apps/v1
kind: Deployment
metadata: 
  name: taintsandtolerations
  # these labels are for replica set
  labels:
    project: toleration-demo
    purpose: replicas 
spec:
  nodeselector: 
    kubernetes.io/hostname: ip-192-168-45-5.ec2.internal
  replicas: 3
  selector: 
  # these labels are used to select pods
    matchLabels: 
      project: toleration-demo
      purpose: replicas 
    # pod definition
  template:
    metadata: 
      labels:
        project: toleration-demo
        purpose: replicas 
    spec: 
      containers: 
      - name: nginx
        image: nginx:latest